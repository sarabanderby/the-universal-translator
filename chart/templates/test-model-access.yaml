# This pod verifies that the configured model endpoint is reachable.
# It runs as a Helm test (helm test <release>) AND can be used standalone
# before deploying the full chart.
#
# Standalone usage (before helm install):
#   oc run test-model-access --rm -it --restart=Never \
#     --image=registry.access.redhat.com/ubi9/ubi-minimal:latest \
#     -- /bin/sh -c 'curl -sf --max-time 10 \
#       -H "Authorization: Bearer YOUR_API_KEY" \
#       -H "Content-Type: application/json" \
#       -d "{\"model\": \"YOUR_MODEL_NAME\", \"messages\": [{\"role\": \"user\", \"content\": \"Say hello in one word.\"}], \"max_tokens\": 10}" \
#       "YOUR_MODEL_ENDPOINT/v1/chat/completions" && echo "" && echo "SUCCESS" || echo "FAILED"'
#
{{- if .Values.model }}
{{- if and .Values.model.name .Values.model.endpoint }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-model-access"
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-model
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing model endpoint connectivity..."
          echo "Model: {{ .Values.model.name }}"
          echo "Endpoint: {{ .Values.model.endpoint }}"

          curl -sf --max-time 10 \
            -H "Authorization: Bearer {{ .Values.model.api_key }}" \
            -H "Content-Type: application/json" \
            -d '{"model": "{{ .Values.model.name }}", "messages": [{"role": "user", "content": "Say hello in one word."}], "max_tokens": 10}' \
            "{{ .Values.model.endpoint }}/v1/chat/completions"

          if [ $? -eq 0 ]; then
            echo ""
            echo "SUCCESS: Model endpoint is reachable and responding."
          else
            echo "FAILED: Could not reach model endpoint."
            exit 1
          fi
{{- end }}
{{- end }}
